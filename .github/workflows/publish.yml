name: Publish

# Publish to npm from CI with no long-lived token. Auth is npm "trusted
# publishing" (OIDC): npmjs.com is configured to trust this repo + workflow, so
# GitHub's short-lived OIDC identity authenticates the publish and `--provenance`
# attaches a verifiable provenance attestation. No NPM_TOKEN secret is stored.
#
# Release flow: bump version + CHANGELOG on main, then push a matching tag:
#   git tag v0.8.2 && git push origin v0.8.2
# The tag must equal "v<version from package.json>" or the job fails before
# publishing. `workflow_dispatch` publishes the current package.json version.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Upgrade npm for trusted publishing (OIDC)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          pkg_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $pkg_version" >&2
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Release verification
        run: npm run release:verify

      - name: Publish (provenance, trusted publishing)
        run: npm publish --provenance --access public --ignore-scripts
